<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VFW Console</title>
    <script>
      // Paint the saved theme before first render so there's no flash of light.
      // Mirrors the KEY/logic in src/theme/ThemeContext.tsx.
      (function () {
        try {
          var v = localStorage.getItem('vfw-theme') || 'system';
          var dark = v === 'dark' ||
            (v === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
          document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
