version: 2

# Keeps dependencies patched without hand-watching advisories. Dependabot opens
# PRs against `main`; CI (ci.yml) gates them like any other PR. Grouped so a week
# of patch bumps is one PR per ecosystem, not thirty.
updates:
  # Backend (NestJS + Prisma).
  - package-ecosystem: npm
    directory: /backend
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      backend-minor-and-patch:
        update-types: [minor, patch]

  # Frontend (React + Vite).
  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      frontend-minor-and-patch:
        update-types: [minor, patch]

  # The workflows themselves (actions/checkout, setup-node, …).
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      actions:
        update-types: [minor, patch]
