name: CI

# Build and type-check both services on every push and PR to main. This is the
# gate; Railway handles the actual deploy (see the README's Railway section).
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend · build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - name: Generate Prisma client
        run: npx prisma generate
      - name: Validate Prisma schema
        # A URL only has to be parseable here — no database is contacted.
        run: npx prisma validate
        env:
          DATABASE_URL: postgresql://user:pass@localhost:5432/vfw
      - name: Compile
        run: npm run build

  frontend:
    name: Frontend · build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Type-check and build
        run: npm run build
